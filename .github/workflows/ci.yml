name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test with coverage
      run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

    - name: Generate coverage report
      run: |
        dotnet tool install -g dotnet-reportgenerator-globaltool
        reportgenerator -reports:**/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:"Html;TextSummary"

    - name: Check coverage threshold
      run: |
        COVERAGE=$(grep -oP 'Line coverage: \K[0-9.]+' coverage-report/Summary.txt)
        echo "Line coverage: $COVERAGE%"
        if (( $(echo "$COVERAGE < 95" | bc -l) )); then
          echo "Coverage $COVERAGE% is below 95% threshold"
          exit 1
        fi

    - name: Upload coverage report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: coverage-report
        path: coverage-report

  deploy-nuget:
    name: Deploy to NuGet
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Pack
      run: dotnet pack MiniatR/MiniatR.csproj --configuration Release --output ./nupkg

    - name: Upload package artifact
      uses: actions/upload-artifact@v7
      with:
        name: nuget-package
        path: ./nupkg/*.nupkg

    - name: Push to NuGet
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
